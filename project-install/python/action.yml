name: 'actions-steps/project-install/python'
description: 'Installing python project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: installing python project
      if: hashFiles('pyproject.toml') != ''
      run: |
        python -m venv .venv
        source .venv/bin/activate
        pip install .[dev,lint,test] --no-cache-dir
        poetry export --without-hashes --output requirements.txt
      shell: bash
