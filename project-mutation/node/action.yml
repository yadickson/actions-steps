name: 'actions-steps/project-mutation/node'
description: 'Mutation testing node project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: mutation testing node project
      if: hashFiles('package.json') != ''
      run: npm run test:mutation
      id: mutation
      continue-on-error: true
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: mutation
        path: reports/mutation
        retention-days: 1
        if-no-files-found: ignore

    - name: mutation node project fail
      if: steps.mutation.outcome == 'failure'
      run: exit 1
      shell: bash
