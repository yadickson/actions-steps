name: 'actions-steps/project-mutation/python'
description: 'Mutation testing python project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: mutation testing python project
      if: hashFiles('pyproject.toml') != ''
      run: |
        source .venv/bin/activate
        poetry run poe test:mutation
      id: mutation
      continue-on-error: true
      shell: sh

    - uses: actions/upload-artifact@v7
      with:
        name: mutation
        path: ./**/mutation
        retention-days: 1
        if-no-files-found: ignore

    - name: mutation python project fail
      if: steps.mutation.outcome == 'failure'
      run: exit 1
      shell: sh
