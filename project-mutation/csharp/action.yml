name: 'actions-steps/project-mutation/csharp'
description: 'Mutation testing csharp project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: mutation testing csharp project
      if: hashFiles('*.csproj') != '' && hashFiles('global.json') != ''
      run: dotnet r test:mutation
      id: mutation
      continue-on-error: true
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: mutation
        path: ./**/mutation
        retention-days: 1
        if-no-files-found: ignore

    - name: mutation csharp project fail
      if: steps.mutation.outcome == 'failure'
      run: exit 1
      shell: bash
