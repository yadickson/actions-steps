name: 'actions-steps/project-test/python'
description: 'Testing python project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: activate python environment
      if: hashFiles('pyproject.toml') != ''
      run: |
        source .venv/bin/activate
      shell: bash

    - name: updating path
      if: hashFiles('pyproject.toml') != ''
      run: echo "~/.local/bin" >> $GITHUB_PATH
      shell: bash

    - name: testing python project
      if: hashFiles('pyproject.toml') != ''
      run: poetry run poe test
      id: testing
      continue-on-error: true
      shell: bash

    - uses: actions/upload-artifact@v6
      with:
        name: xunit
        path: |
          reports/xunit.xml
          reports/**/test*results.xml
        retention-days: 1
        if-no-files-found: ignore

    - name: testing python project fail
      if: steps.testing.outcome == 'failure'
      run: exit 1
      shell: bash
