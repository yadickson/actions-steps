name: 'actions-steps/project-test/python'
description: 'Testing python project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: testing python project
      if: hashFiles('pyproject.toml') != ''
      run: |
        source .venv/bin/activate
        poetry run poe test
      id: testing
      continue-on-error: true
      shell: bash

    - uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: reports/**/test*results.xml
        retention-days: 1
        if-no-files-found: ignore

    - name: testing python project fail
      if: steps.testing.outcome == 'failure'
      run: exit 1
      shell: bash
