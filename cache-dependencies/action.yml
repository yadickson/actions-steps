name: 'actions-steps/cache-dependencies'
description: 'Cache dependencies files'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: getting node dependencies
      if: hashFiles('package.json') != ''
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          package-lock.json
        key: ${{ runner.os }}-cache-dependencies-${{ hashFiles('package.json') }}
        restore-keys: ${{ runner.os }}-cache-dependencies-

    - name: getting python dependencies
      if: hashFiles('pyproject.toml') != ''
      uses: actions/cache@v5
      with:
        path: |
          .venv
          requirements.txt
        key: ${{ runner.os }}-cache-dependencies-${{ hashFiles('pyproject.toml') }}
        restore-keys: ${{ runner.os }}-cache-dependencies-

