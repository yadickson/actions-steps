name: 'actions-steps/project-lint/csharp'
description: 'Linting csharp project'

branding:
  icon: 'box'
  color: 'green'

runs:
  using: "composite"
  steps:

    - name: linting csharp project
      if: hashFiles('*.csproj') != '' && hashFiles('global.json') != ''
      run: dotnet r lint
      shell: bash
